name: Deploy Firestore rules

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "firestore.rules"
      - "firebase.json"
      - "scripts/deploy-firestore-rules.mjs"
      - "scripts/resolve-firebase-project.mjs"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Write .env for project id
        run: |
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" >> .env

      - name: Deploy Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npm run deploy:firestore-rules
