name: Email verification (code flow)

on:
  push:
    branches: [main, master]
    paths:
      - "app/**"
      - "lib/**"
      - "e2e/**"
      - "scripts/verify-email-code-flow.mjs"
      - "next.config.ts"
      - "playwright.config.ts"
      - "package.json"
  pull_request:
    branches: [main, master]
    paths:
      - "app/**"
      - "lib/**"
      - "e2e/**"
      - "scripts/verify-email-code-flow.mjs"
      - "next.config.ts"
      - "playwright.config.ts"
      - "package.json"
  workflow_dispatch:

jobs:
  static-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Static verify (code flow only)
        run: npm run verify:email-flow

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E (local server)
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
