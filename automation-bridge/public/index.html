<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Bridge</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #111827;
        --ok: #166534;
        --warn: #92400e;
        --err: #b91c1c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 14px;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        border: 1px solid var(--line);
        padding: 16px;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 12px 0;
        font-size: 28px;
      }
      h2 {
        margin: 0 0 12px 0;
        font-size: 19px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      input[type="text"] {
        width: 100%;
        min-height: 52px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 17px;
      }
      button {
        min-height: 50px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        background: #fff;
        padding: 12px 16px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .btn-block {
        width: 100%;
      }
      .last-result-grid {
        display: grid;
        gap: 10px;
      }
      .result-item {
        display: grid;
        gap: 4px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fafafa;
      }
      .result-label {
        font-size: 12px;
        color: var(--muted);
      }
      .result-value {
        font-size: 15px;
        font-weight: 600;
        word-break: break-word;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 700;
      }
      .status-running {
        background: #fff7ed;
        color: var(--warn);
      }
      .status-done {
        background: #ecfdf5;
        color: var(--ok);
      }
      .status-error {
        background: #fff1f2;
        color: var(--err);
      }
      .review-approved {
        background: #ecfdf5;
        color: var(--ok);
      }
      .review-revise {
        background: #fffbeb;
        color: var(--warn);
      }
      .review-rejected {
        background: #fff1f2;
        color: var(--err);
      }
      .logs {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 6px;
      }
      .logs li {
        font-size: 14px;
        color: #1f2937;
      }
      .task {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
        background: #fafafa;
      }
      .muted {
        color: var(--muted);
      }
      .task-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 10px;
      }
      .task-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .task-meta {
        font-size: 13px;
        color: var(--muted);
      }
      .task-status {
        margin-top: 8px;
        font-size: 14px;
      }
      .task-revision {
        margin-top: 8px;
        padding: 10px;
        border: 1px solid #f59e0b;
        border-radius: 10px;
        background: #fffbeb;
        color: #78350f;
        font-size: 13px;
      }
      .review-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .review-kv {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        background: #fafafa;
      }
      .review-k {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 4px;
      }
      .review-v {
        font-size: 14px;
        font-weight: 600;
        word-break: break-word;
      }
      .controls-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      @media (max-width: 640px) {
        h1 {
          font-size: 24px;
        }
        .task-top {
          flex-direction: column;
          align-items: stretch;
        }
        .controls-row {
          display: grid;
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Automation Bridge</h1>
        <div class="row">
          <input
            id="taskInput"
            type="text"
            placeholder="Введите задачу, например: добавь историю смет"
          />
        </div>
        <div class="controls-row" style="margin-top: 10px">
          <button id="runBtn" class="btn-primary btn-block">Запустить задачу</button>
        </div>
      </div>

      <div class="card">
        <h2 style="margin: 0 0 10px 0">Telegram</h2>
        <div id="telegramPanel" class="muted">Загрузка статуса…</div>
        <div class="controls-row" style="margin-top: 12px">
          <button type="button" class="btn-block" onclick="window.location.href='/telegram-setup'">
            Открыть Telegram setup
          </button>
          <a
            class="btn-block"
            href="/telegram-debug"
            target="_blank"
            rel="noopener noreferrer"
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              text-decoration: none;
              color: inherit;
              border: 1px solid #d1d5db;
              border-radius: 12px;
              background: #fff;
              padding: 12px 16px;
              font-size: 16px;
              font-weight: 600;
              text-align: center;
            "
            >Открыть telegram debug</a>
        </div>
      </div>

      <div class="card">
        <div class="task-top">
          <h2 style="margin: 0">Последний результат</h2>
          <button id="copyBtn">Копировать результат</button>
        </div>
        <div id="lastResult" class="last-result-grid">
          <div class="muted">Пока нет запусков</div>
        </div>
      </div>

      <div class="card">
        <div class="task-top">
          <h2 style="margin: 0">Список задач</h2>
          <button id="refreshBtn">Обновить список</button>
        </div>
        <div id="tasksList" class="muted">Загрузка...</div>
      </div>
    </div>

    <script>
      const taskInput = document.getElementById("taskInput");
      const runBtn = document.getElementById("runBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const copyBtn = document.getElementById("copyBtn");
      const lastResult = document.getElementById("lastResult");
      const tasksList = document.getElementById("tasksList");
      const telegramPanel = document.getElementById("telegramPanel");
      let lastTaskId = "";
      let lastTaskData = null;
      let isRefreshing = false;

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function telegramChatMatchLabel(allowedRaw, receivedRaw) {
        const allowed = String(allowedRaw || "").trim();
        const received = String(receivedRaw || "").trim();
        if (!allowed || !received) return "n/a";
        if (allowed === received) return "yes";
        if (/^-?\d+$/.test(allowed) && /^-?\d+$/.test(received)) {
          try {
            return BigInt(allowed) === BigInt(received) ? "yes" : "no";
          } catch (_e) {
            return "no";
          }
        }
        return "no";
      }

      function statusLabel(value) {
        if (value === "running") return { text: "🟡 Выполняется", cls: "status-running" };
        if (value === "done") return { text: "🟢 Готово", cls: "status-done" };
        if (value === "failed" || value === "error") return { text: "🔴 Ошибка", cls: "status-error" };
        return { text: String(value || "—"), cls: "status-running" };
      }

      function reviewOutcome(task) {
        const decision = String(task?.controllerDecision || "").toLowerCase();
        const reviewStatus = String(task?.reviewStatus || "").toLowerCase();
        if (decision === "approve" || reviewStatus === "approved") {
          return { text: "🟢 Проверка пройдена", cls: "review-approved" };
        }
        if (decision === "revise") {
          return { text: "🟡 Отправлено на доработку", cls: "review-revise" };
        }
        if (decision === "reject" || reviewStatus === "rejected") {
          return { text: "🔴 Отклонено", cls: "review-rejected" };
        }
        return { text: "—", cls: "status-running" };
      }

      function formatLogs(logs) {
        const items = Array.isArray(logs) ? logs.slice(-3).reverse() : [];
        if (items.length === 0) return "<div class='muted'>Логов пока нет</div>";
        return `<ul class="logs">${items
          .map((item) => `<li>${escapeHtml(item?.message || "")}</li>`)
          .join("")}</ul>`;
      }

      function renderLastResult(task) {
        lastTaskData = task || null;
        if (!task) {
          lastResult.innerHTML = '<div class="muted">Пока нет запусков</div>';
          return;
        }

        const status = statusLabel(task.status);
        const review = reviewOutcome(task);
        lastResult.innerHTML = `
          <div class="result-item">
            <div class="result-label">taskId</div>
            <div class="result-value">${escapeHtml(task.id)}</div>
          </div>
          <div class="result-item">
            <div class="result-label">goal</div>
            <div class="result-value">${escapeHtml(taskTitle(task))}</div>
          </div>
          <div class="result-item">
            <div class="result-label">status</div>
            <div class="result-value"><span class="status-badge ${status.cls}">${status.text}</span></div>
          </div>
          <div class="result-item">
            <div class="result-label">reviewStatus</div>
            <div class="result-value">${escapeHtml(task.reviewStatus || "—")}</div>
          </div>
          <div class="result-item">
            <div class="result-label">controllerDecision</div>
            <div class="result-value">${escapeHtml(task.controllerDecision || "—")}</div>
          </div>
          <div class="result-item">
            <div class="result-label">итог проверки</div>
            <div class="result-value"><span class="status-badge ${review.cls}">${review.text}</span></div>
          </div>
          <div class="result-item">
            <div class="result-label">последние 3 лога</div>
            ${formatLogs(task.logs)}
          </div>
          <div class="result-item">
            <div class="result-label">Статус проверки</div>
            <div class="review-grid">
              <div class="review-kv">
                <div class="review-k">agentStatus</div>
                <div class="review-v">${escapeHtml(task.agentStatus || "—")}</div>
              </div>
              <div class="review-kv">
                <div class="review-k">reviewStatus</div>
                <div class="review-v">${escapeHtml(task.reviewStatus || "—")}</div>
              </div>
              <div class="review-kv">
                <div class="review-k">controllerDecision</div>
                <div class="review-v">${escapeHtml(task.controllerDecision || "—")}</div>
              </div>
              <div class="review-kv">
                <div class="review-k">lifecycleStage</div>
                <div class="review-v">${escapeHtml(task.lifecycleStage || "—")}</div>
              </div>
            </div>
          </div>
        `;
      }

      function taskTitle(task) {
        return task.goal || task.title || "Без названия";
      }

      function renderTasks(tasks) {
        if (!Array.isArray(tasks) || tasks.length === 0) {
          tasksList.innerHTML =
            '<div class="muted">Задач пока нет. Запустите первую задачу.</div>';
          return;
        }

        tasksList.innerHTML = tasks
          .map((task) => {
            const summaryUrl = `/tasks/${encodeURIComponent(task.id)}/summary`;
            const status = statusLabel(task.status);
            const review = reviewOutcome(task);
            const isRevising = String(task.controllerDecision || "").toLowerCase() === "revise";
            const revisionInstructions = task.latestRevision?.instructions
              ? `
                <div class="task-revision">
                  <strong>🟡 На доработке</strong><br />
                  ${escapeHtml(task.latestRevision.instructions)}
                </div>
              `
              : "";
            return `
              <div class="task">
                <div class="task-top">
                  <div>
                    <div class="task-title">${escapeHtml(taskTitle(task))}</div>
                    <div class="task-meta">${escapeHtml(task.id)} · source: ${escapeHtml(
              task.source || "manual"
            )}</div>
                  </div>
                  <button onclick="window.open('${summaryUrl}','_blank')">Открыть</button>
                </div>
                <div class="task-status">
                  <strong>${status.text}</strong>
                  <span class="muted"> · agent: ${escapeHtml(task.agentStatus)} · review: ${escapeHtml(
              task.reviewStatus
            )} · lifecycle: ${escapeHtml(task.lifecycleStage)}</span>
                </div>
                <div class="task-status">
                  <strong>${review.text}</strong>
                  <span class="muted"> · decision: ${escapeHtml(
                    task.controllerDecision || "—"
                  )} · revisions: ${escapeHtml(task.revisionCount ?? 0)}</span>
                </div>
                ${isRevising ? revisionInstructions || '<div class="task-revision"><strong>🟡 На доработке</strong></div>' : ""}
              </div>
            `;
          })
          .join("");
      }

      async function fetchTelegramPanel() {
        try {
          const [stRes, dbgRes] = await Promise.all([
            fetch("/api/telegram-status"),
            fetch("/telegram-debug"),
          ]);
          const d = await stRes.json();
          const dbg = await dbgRes.json();
          const tgStatus = dbg.telegramEnabled ? "enabled" : "disabled";
          const allowed = dbg.allowedChatId != null && dbg.allowedChatId !== "" ? dbg.allowedChatId : "—";
          const poll = d.runtimePolling ? "да" : "нет";
          const ev = dbg.lastTelegramEvent || "—";
          const er = dbg.lastTelegramError || "—";
          const meta = dbg.lastTelegramMessageMeta;
          const received =
            meta && meta.chatId != null && meta.chatId !== "" ? String(meta.chatId) : "—";
          const chatMatch =
            allowed === "—" || received === "—"
              ? "n/a"
              : telegramChatMatchLabel(allowed, received);
          telegramPanel.innerHTML = `Telegram: <strong>${escapeHtml(
            tgStatus
          )}</strong> · polling: ${escapeHtml(poll)}<br /><span class="muted">allowed chat id:</span> <strong>${escapeHtml(
            String(allowed)
          )}</strong><br /><span class="muted">last message chat id:</span> <strong>${escapeHtml(
            received
          )}</strong> · <span class="muted">match:</span> ${escapeHtml(chatMatch)}<br /><span class="muted">Last Telegram event:</span> ${escapeHtml(
            ev
          )}<br /><span class="muted">Last Telegram error:</span> ${escapeHtml(er)}`;
        } catch (_e) {
          telegramPanel.textContent = "Не удалось загрузить статус Telegram";
        }
      }

      async function fetchTasks() {
        if (isRefreshing) return;
        isRefreshing = true;
        tasksList.innerHTML = '<div class="muted">Загрузка...</div>';
        try {
          await fetchTelegramPanel();
          const res = await fetch("/tasks");
          const data = await res.json();
          renderTasks(data);
          const picked = Array.isArray(data)
            ? data.find((item) => item.id === lastTaskId) || data[0]
            : null;
          renderLastResult(picked || null);
        } catch (error) {
          tasksList.innerHTML = `<div class="muted">Ошибка загрузки: ${escapeHtml(error.message)}</div>`;
        } finally {
          isRefreshing = false;
        }
      }

      async function runTask() {
        const text = taskInput.value.trim();
        if (!text) {
          alert("Введите задачу");
          return;
        }

        runBtn.disabled = true;
        runBtn.textContent = "Запуск...";
        try {
          const res = await fetch(`/run?text=${encodeURIComponent(text)}`);
          const data = await res.json();
          if (data && data.taskId) {
            lastTaskId = data.taskId;
          }
          await fetchTasks();
        } catch (error) {
          renderLastResult({
            id: "—",
            goal: text,
            status: "error",
            logs: [{ message: error.message }],
          });
        } finally {
          runBtn.disabled = false;
          runBtn.textContent = "Запустить задачу";
        }
      }

      async function copyResult() {
        if (!lastTaskData) {
          alert("Нет результата для копирования");
          return;
        }
        const text = [
          `taskId: ${lastTaskData.id || ""}`,
          `goal: ${taskTitle(lastTaskData)}`,
          `status: ${statusLabel(lastTaskData.status).text}`,
          `reviewStatus: ${lastTaskData.reviewStatus || "—"}`,
          `controllerDecision: ${lastTaskData.controllerDecision || "—"}`,
          `review: ${reviewOutcome(lastTaskData).text}`,
          "последние 3 лога:",
          ...(Array.isArray(lastTaskData.logs)
            ? lastTaskData.logs.slice(-3).reverse().map((item) => `- ${item.message || ""}`)
            : []),
        ].join("\n");

        await navigator.clipboard.writeText(text);
        alert("Результат скопирован");
      }

      runBtn.addEventListener("click", runTask);
      refreshBtn.addEventListener("click", fetchTasks);
      copyBtn.addEventListener("click", copyResult);
      taskInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") runTask();
      });

      fetchTasks();
      setInterval(fetchTasks, 3000);
    </script>
  </body>
</html>
